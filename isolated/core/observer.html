<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>NomadAI Observer</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #0d0d0d;
                color: #e0e0e0;
                font-family: monospace;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            #topbar {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 6px 14px;
                background: #111;
                border-bottom: 1px solid #222;
                flex-shrink: 0;
            }
            #topbar h1 {
                font-size: 13px;
                color: #7ec8e3;
                letter-spacing: 1px;
                font-weight: bold;
            }
            #status {
                font-size: 11px;
                color: #555;
                margin-left: auto;
            }
            #status.connected {
                color: #a8ff78;
            }
            #tabs {
                display: flex;
                gap: 0;
                background: #111;
                border-bottom: 1px solid #222;
                flex-shrink: 0;
            }
            .tab {
                padding: 7px 18px;
                font-size: 12px;
                cursor: pointer;
                color: #888;
                border-right: 1px solid #1e1e1e;
                user-select: none;
            }
            .tab:hover {
                color: #ccc;
            }
            .tab.active {
                color: #7ec8e3;
                border-bottom: 2px solid #7ec8e3;
            }
            #content {
                flex: 1;
                overflow: hidden;
                position: relative;
            }
            .page {
                display: none;
                height: 100%;
                overflow: hidden;
            }
            .page.active {
                display: flex;
                gap: 8px;
                padding: 8px;
            }
            /* Live page */
            .panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-width: 0;
            }
            .panel h3 {
                font-size: 11px;
                color: #7ec8e3;
                text-transform: uppercase;
                letter-spacing: 1px;
                padding: 4px 0;
                flex-shrink: 0;
            }
            .scroll {
                flex: 1;
                overflow-y: auto;
                background: #111;
                border: 1px solid #222;
                padding: 6px;
                font-size: 11px;
                line-height: 1.7;
            }
            .entry {
                border-bottom: 1px solid #1a1a1a;
                padding: 3px 0;
                word-break: break-all;
            }
            .ts {
                color: #555;
                margin-right: 6px;
            }
            .etype {
                margin-right: 6px;
                font-weight: bold;
            }
            .thought .etype,
            .plan .etype {
                color: #7ec8e3;
            }
            .tool_call .etype {
                color: #a8ff78;
            }
            .tool_result .etype {
                color: #5c9e5c;
            }
            .blocked_action .etype,
            .error .etype {
                color: #ff5e5e;
            }
            .memory_update .etype,
            .module_load .etype,
            .module_unload .etype {
                color: #c792ea;
            }
            .restart_request .etype {
                color: #f0a500;
            }
            .boot .etype {
                color: #fff;
            }
            /* Files page */
            #files-page {
                flex-direction: row;
            }
            #file-tree {
                width: 240px;
                flex-shrink: 0;
                border: 1px solid #222;
                overflow-y: auto;
                font-size: 12px;
                background: #111;
            }
            #file-tree .item {
                padding: 3px 8px;
                cursor: pointer;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            #file-tree .item:hover {
                background: #1a1a1a;
            }
            #file-tree .item.dir {
                color: #7ec8e3;
            }
            #file-tree .item.sel {
                background: #1e2e1e;
            }
            #file-view {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-width: 0;
            }
            #file-view h3 {
                font-size: 11px;
                color: #7ec8e3;

            }

                line-height: 1.6;
                white-space: pre-wrap;
                word-break: break-all;

            /* Data pages shared */
            .data-page {
                flex-direction: column;
                gap: 0;
                padding: 0;
            }
            .data-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 10px 14px;
                font-size: 12px;
            }
            .data-item {
                padding: 6px 0;
                border-bottom: 1px solid #1a1a1a;
            }
            .key {
                color: #7ec8e3;
                font-weight: bold;
            }
            .val {
                color: #e0e0e0;

            .meta {
                color: #555;
                font-size: 11px;
            }
            .badge {
                display: inline-block;

                font-size: 11px;
                margin-right: 6px;

            .badge.high {
                background: #4a1515;
                color: #ff5e5e;
            }
            .badge.normal {
                background: #1a2a1a;
                color: #a8ff78;
            }

                background: #1a1a2a;

            }
            .badge.pending {
                background: #2a2a0a;
                color: #f0a500;
            }
            .badge.approved {
                background: #0a2a0a;
                color: #a8ff78;
            }
            .badge.denied {
                background: #2a0a0a;
                color: #ff5e5e;
            }
            .toolbar {

                background: #111;

                color: #555;

            }
            .hint_response .etype {

            }

            }
            .hint_response.rejected .etype {

            }
            .hint_response.read .etype {

            }
            /* Hint bar */

            /* Chat page */
            .chat-page {
                flex-direction: column !important;

            }

            }
            .msg-status.accepted {

            }
            .msg-status.rejected {

            }
            .msg-status.read {

            }
            .msg-status.pending {

                background: #1a1a1a;
                border: 1px solid #333;

                border-color: #7ec8e3;
            }
            #chat-send {
                background: #1a2a1a;
                border: 1px solid #3a5a3a;
                color: #a8ff78;
                padding: 6px 16px;
                cursor: pointer;
                font-family: monospace;
                font-size: 12px;
                border-radius: 4px;
            }

            }

                font-size: 11px;

        </style>
    </head>
    <body>
        <div id="topbar">
            <h1>NomadAI Observer</h1>
            <span id="status">disconnected</span>
        </div>
        <div id="tabs">
            <div class="tab active" data-page="live">Live Events</div>
            <div class="tab" data-page="chat">Chat</div>
            <div class="tab" data-page="files">Files</div>
            <div class="tab" data-page="memory">Memory</div>
            <div class="tab" data-page="goals">Goals</div>
            <div class="tab" data-page="restarts">Restarts</div>
            <div class="tab" data-page="snapshots">Snapshots</div>
        </div>

        <div id="content">
            <!-- Live Events page -->
            <div class="page active" id="page-live">
                <div class="panel">
                    <h3>Thoughts &amp; Plans</h3>
                    <div class="scroll" id="p-thoughts"></div>
                </div>
                <div class="panel">
                    <h3>Tools &amp; Actions</h3>
                    <div class="scroll" id="p-commands"></div>
                </div>
                <div class="panel">
                    <h3>Errors &amp; Alerts</h3>
                    <div class="scroll" id="p-alerts"></div>
                </div>
            </div>
            <!-- Chat page -->
            <div class="page chat-page" id="page-chat">
                <div id="chat-messages"></div>
                <div class="chat-input-row">
                    <input
                        id="chat-input"
                        type="text"
                        placeholder="Send a hint to the AI…"
                        maxlength="500"
                    />
                    <button id="chat-send" onclick="sendChatHint()">
                        Send
                    </button>
                    <span id="chat-send-status"></span>
                </div>
            </div>
            <!-- Files page -->
            <div class="page" id="page-files">
                <div
                    id="files-page"
                    style="
                        display: flex;
                        width: 100%;
                        height: 100%;
                        gap: 8px;
                        padding: 8px;
                    "
                >
                    <div id="file-tree"></div>
                    <div id="file-view">
                        <h3 id="file-path-label">Select a file</h3>
                        <div id="file-content" style="color: #555">
                            Click a file in the tree to view its contents.
                        </div>
                    </div>
                </div>
            </div>
            <!-- Memory page -->
            <div class="page data-page" id="page-memory">
                <div class="toolbar">
                    Long-Term Memory
                    <button onclick="loadMemory()">Refresh</button>
                </div>
                <div class="data-scroll" id="mem-list"></div>
            </div>
            <!-- Goals page -->
            <div class="page data-page" id="page-goals">
                <div class="toolbar">
                    Goals <button onclick="loadGoals()">Refresh</button>
                </div>
                <div class="data-scroll" id="goals-list"></div>
            </div>
            <!-- Restarts page -->
            <div class="page data-page" id="page-restarts">
                <div class="toolbar">
                    Restart History
                    <button onclick="loadRestarts()">Refresh</button>
                </div>
                <div class="data-scroll" id="restarts-list"></div>
            </div>
            <!-- Snapshots page -->
            <div class="page data-page" id="page-snapshots">
                <div class="toolbar">
                    Snapshots <button onclick="loadSnapshots()">Refresh</button>
                </div>
                <div class="data-scroll" id="snapshots-list"></div>
            </div>
        </div>
        <script>
            // ── Tab switching ──
            const tabs = document.querySelectorAll(".tab");
            const pages = document.querySelectorAll(".page");
            tabs.forEach((t) =>
                t.addEventListener("click", () => {
                    tabs.forEach((x) => x.classList.remove("active"));
                    pages.forEach((x) => x.classList.remove("active"));
                    t.classList.add("active");
                    document
                        .getElementById("page-" + t.dataset.page)
                        .classList.add("active");
                    const loaders = {
                        chat: loadChat,
                        files: loadFiles,
                        memory: loadMemory,
                        goals: loadGoals,
                        restarts: loadRestarts,
                        snapshots: loadSnapshots,
                    };
                    if (loaders[t.dataset.page]) loaders[t.dataset.page]();
                }),
            );

            // ── Live events ──
            const pThoughts = document.getElementById("p-thoughts");
            const pCommands = document.getElementById("p-commands");
            const pAlerts = document.getElementById("p-alerts");
            const statusEl = document.getElementById("status");
            const THOUGHT_TYPES = new Set(["thought", "plan", "boot"]);
            const ALERT_TYPES = new Set([
                "blocked_action",
                "error",
                "restart_request",
                "shutdown",
            ]);
            const CHAT_TYPES = new Set([
                "hint",
                "hint_request",
                "hint_response",
                "hint_wait",
                "hint_wait_done",
            ]);
            function addEntry(panel, ev) {
                const el = document.createElement("div");
                const ts = new Date().toLocaleTimeString();
                let body;
                let extraClass = "";
                if (
                    ev.type === "hint_response" &&
                    ev.data &&
                    typeof ev.data === "object"
                ) {
                    const status = ev.data.status || "read";
                    const resp = ev.data.response
                        ? ' — "' + ev.data.response + '"'
                        : "";
                    body = "AI " + status + " hint" + resp;
                    extraClass = " " + status;
                } else {
                    body =
                        typeof ev.data === "object"
                            ? JSON.stringify(ev.data)
                            : String(ev.data || "");
                }
                el.className = "entry " + ev.type + extraClass;
                el.innerHTML =
                    '<span class="ts">' +
                    ts +
                    '</span><span class="etype">[' +
                    ev.type +
                    "]</span>" +
                    esc(body);
                panel.appendChild(el);
                panel.scrollTop = panel.scrollHeight;
                if (panel.children.length > 500)
                    panel.removeChild(panel.firstChild);
            }
            function esc(s) {
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            // Detect mock mode: placeholders not replaced means file opened standalone
            let WS_TOKEN,
                WS_PORT,
                MOCK_MODE = false;
            try {
                WS_TOKEN = __WS_TOKEN__;
                WS_PORT = __WS_PORT__;
            } catch (_) {
                MOCK_MODE = true;
                WS_TOKEN = "";
                WS_PORT = 3001;
            }

            const MOCK = {
                memory: {
                    "env.os": {
                        value: "Linux 6.1 x86_64",
                        tags: ["system"],
                        updatedAt: "2026-03-28T10:00:00Z",
                    },
                    "self.language": {
                        value: "JavaScript / Bun",
                        tags: ["identity"],
                        updatedAt: "2026-03-28T10:01:00Z",
                    },
                    "goal.current": {
                        value: "Explore filesystem and build a utility module",
                        tags: ["goal"],
                        updatedAt: "2026-03-28T10:02:00Z",
                    },
                },
                goals: [
                    {
                        goal: "Explore the /open/ filesystem and document its structure",
                        priority: "high",
                        createdAt: "2026-03-28T10:00:00Z",
                    },
                    {
                        goal: "Write a utility module for string formatting",
                        priority: "normal",
                        createdAt: "2026-03-28T10:05:00Z",
                    },
                ],
                restarts: [
                    {
                        timestamp: "2026-03-28T09:55:00Z",
                        reason: "Initial boot after install",
                        status: "approved",
                        outcome: "resumed cleanly",
                    },
                ],
                snapshots: [
                    {
                        id: "snap_1711620000",
                        label: "pre-module-write",
                        timestamp: "2026-03-28T10:03:00Z",
                        note: "Before writing formatter.js",
                    },
                    {
                        id: "snap_1711619700",
                        label: "boot",
                        timestamp: "2026-03-28T09:55:00Z",
                    },
                ],
                files: {
                    "": [
                        { name: "modules", isDir: true },
                        { name: "memory", isDir: true },
                        { name: "snapshots", isDir: true },
                        { name: "thoughts.log", isDir: false, size: 2048 },
                        { name: "goals.json", isDir: false, size: 256 },
                        { name: "restarts.json", isDir: false, size: 128 },
                    ],
                    modules: [{ name: "example.js", isDir: false, size: 1024 }],
                    memory: [
                        { name: "longTerm.json", isDir: false, size: 512 },
                        { name: "episodic.json", isDir: false, size: 768 },
                    ],
                },
                fileContent: {
                    "thoughts.log":
                        "2026-03-28T10:00:00Z  Booted. Checking environment.\n2026-03-28T10:01:00Z  Reading IDENTITY.md.\n2026-03-28T10:02:00Z  Setting initial goal.",
                    "goals.json":
                        '[\n  {\n    "goal": "Explore the /open/ filesystem",\n    "priority": "high",\n    "createdAt": "2026-03-28T10:00:00Z"\n  }\n]',
                    "restarts.json":
                        '[\n  {\n    "timestamp": "2026-03-28T09:55:00Z",\n    "reason": "Initial boot",\n    "status": "approved"\n  }\n]',
                    "modules/example.js":
                        '// Example module — read this before writing your own\nmodule.exports = { hello: () => "world" };',
                },
                events: [
                    {
                        type: "boot",
                        data: { timestamp: "2026-03-28T10:00:00Z" },
                    },
                    {
                        type: "thought",
                        data: "Checking environment and reading IDENTITY.md.",
                    },
                    {
                        type: "plan",
                        data: "Run OSInfo, then read example.js before writing any module.",

                    { type: "tool_call", data: { tool: "OSInfo", args: {} } },
                    {
                        type: "tool_result",
                        data: {
                            tool: "OSInfo",
                            ok: true,
                            result: { distro: "Debian 13", arch: "x86_64" },
                        },
                    },
                    {
                        type: "thought",
                        data: "Environment confirmed. Will now read example.js.",
                    },
                    {
                        type: "tool_call",
                        data: {
                            tool: "ReadFile",
                            args: { path: "/open/modules/example.js" },
                        },
                    },
                    {

                    },
                    {
                        type: "memory_update",
                        data: { key: "env.os", value: "Linux 6.1 x86_64" },
                    },
                    {

                    {

                hints: [

                    },

                        message:
                            "I found something interesting in /isolated/ — the core uses Bun.serve(). Should I try to mirror that pattern?",
                        timestamp: "2026-03-28T10:20:00Z",
                        seen: true,
                        status: "request",
                        type: "request",
                    },
                    {
                        id: "h3",
                        text: "Yes, go ahead and try it!",
                        timestamp: "2026-03-28T10:21:00Z",
                        seen: false,
                        status: "pending",
                    },
                ],
            };

            function mockFetch(path) {
                // avoid new URL(path, file://) which misbehaves in file:// context
                const qi = path.indexOf("?");
                const p = qi >= 0 ? path.slice(0, qi) : path;
                const qs = qi >= 0 ? path.slice(qi + 1) : "";
                const params = new URLSearchParams(qs);
                const rel = params.get("path") || "";
                const ok = (data) =>
                    Promise.resolve({ json: () => Promise.resolve(data) });
                if (p === "/api/hints") return ok(MOCK.hints || []);
                if (p === "/api/memory") return ok(MOCK.memory);
                if (p === "/api/goals") return ok(MOCK.goals);
                if (p === "/api/restarts") return ok(MOCK.restarts);
                if (p === "/api/snapshots") return ok(MOCK.snapshots);
                if (p === "/api/files") return ok(MOCK.files[rel] || []);
                if (p === "/api/file") {
                    const content =
                        MOCK.fileContent[rel] ||
                        "(no mock content for this file)";
                    return ok({ content });
                }
                return ok({});
            }

            function connect() {
                if (MOCK_MODE) {
                    statusEl.textContent = "mock mode";
                    statusEl.style.color = "#f0a500";
                    MOCK.events.forEach((ev, i) =>
                        setTimeout(() => {
                            if (THOUGHT_TYPES.has(ev.type))
                                addEntry(pThoughts, ev);
                            else if (ALERT_TYPES.has(ev.type))
                                addEntry(pAlerts, ev);
                            else addEntry(pCommands, ev);
                            if (CHAT_TYPES.has(ev.type)) addChatEvent(ev);
                        }, i * 120),
                    );
                    return;
                }
                const url =
                    "ws://" +
                    location.hostname +
                    ":" +
                    WS_PORT +
                    (WS_TOKEN ? "?token=" + encodeURIComponent(WS_TOKEN) : "");
                const ws = new WebSocket(url);
                ws.onopen = () => {
                    statusEl.textContent = "connected";
                    statusEl.className = "connected";
                };
                ws.onclose = (e) => {
                    statusEl.textContent =
                        e.code === 4401 ? "auth failed" : "disconnected";
                    statusEl.className = "";
                    if (e.code !== 4401) setTimeout(connect, 3000);
                };
                ws.onmessage = (e) => {
                    try {
                        const ev = JSON.parse(e.data);
                        if (THOUGHT_TYPES.has(ev.type)) addEntry(pThoughts, ev);
                        else if (ALERT_TYPES.has(ev.type))
                            addEntry(pAlerts, ev);
                        else addEntry(pCommands, ev);
                        if (CHAT_TYPES.has(ev.type)) addChatEvent(ev);
                    } catch (_) {}
                };
            }
            connect();

            const apiFetch = (path, opts) =>
                MOCK_MODE ? mockFetch(path) : fetch(path, opts);


            // ── Chat ──
            const chatMessages = document.getElementById("chat-messages");

            function chatMsgEl(h) {
                const isReq = h.type === "request" || h.status === "request";
                const el = document.createElement("div");
                el.className = "msg " + (isReq ? "ai-req" : "observer");
                el.id = "cmsg-" + h.id;
                const text = isReq ? h.message || "" : h.text || "";
                const ts = h.timestamp
                    ? new Date(h.timestamp).toLocaleTimeString()
                    : "";
                const label = isReq ? "🤖 AI" : "👤 You";
                let statusBadge = "";
                if (!isReq && h.status)
                    statusBadge =
                        ' <span class="msg-status ' +
                        esc(h.status) +
                        '">' +
                        esc(h.status) +
                        "</span>";
                let replyHtml = "";
                if (h.response && h.status !== "request") {
                    const rts = h.respondedAt
                        ? new Date(h.respondedAt).toLocaleTimeString()
                        : "";
                    replyHtml =
                        '<div class="msg-reply"><div class="msg msg-bubble" style="background:#111;border:1px solid #222;color:#aaa;padding:6px 10px;border-radius:8px">' +
                        esc(h.response) +
                        '</div><div class="msg-meta">🤖 AI · ' +
                        esc(rts) +
                        "</div></div>";
                }
                el.innerHTML =
                    '<div class="msg-bubble">' +
                    esc(text) +
                    '</div><div class="msg-meta">' +
                    esc(label) +
                    " · " +
                    esc(ts) +
                    statusBadge +
                    "</div>" +
                    replyHtml;
                return el;
            }

            async function loadChat() {
                chatMessages.innerHTML = "";
                let hints = [];
                try {
                    hints = await apiFetch("/api/hints").then((r) => r.json());
                    if (!Array.isArray(hints)) hints = [];
                } catch (_) {}
                if (!hints.length) {
                    chatMessages.innerHTML =
                        '<div style="color:#555;text-align:center;margin-top:20px;font-size:12px">No hints yet. Send one below.</div>';
                    return;
                }
                hints.sort((a, b) =>
                    (a.timestamp || "").localeCompare(b.timestamp || ""),
                );
                for (const h of hints) chatMessages.appendChild(chatMsgEl(h));
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            let _waitNotice = null;

            function addChatEvent(ev) {
                if (ev.type === "hint" && ev.data) {
                    // Dedup: skip if a bubble with this ID already exists
                    const hintId = ev.data.id || ("live_" + Date.now());
                    if (hintId && document.getElementById("cmsg-" + hintId)) return;
                    const h = {
                        id: hintId,
                        text: ev.data.text,
                        timestamp: ev.data.timestamp || new Date().toISOString(),
                        status: "pending",
                    };
                    chatMessages.appendChild(chatMsgEl(h));
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                } else if (ev.type === "hint_response" && ev.data) {
                    // Update existing bubble with AI reply, or append standalone
                    const existing = document.getElementById("cmsg-" + ev.data.id);
                    if (existing) {
                        const h = {
                            id: ev.data.id,
                            text: existing.querySelector(".msg-bubble")?.textContent || "",
                            status: ev.data.status,
                            response: ev.data.response,
                            respondedAt: new Date().toISOString(),
                        };
                        existing.replaceWith(chatMsgEl(h));
                    } else {
                        const reply = document.createElement("div");
                        reply.className = "msg ai";
                        const resp = ev.data.response ? esc(ev.data.response) : "(no response)";
                        const st = esc(ev.data.status || "read");
                        reply.innerHTML = '<div class="msg-bubble">'+resp+'</div><div class="msg-meta">🤖 AI · <span class="msg-status '+st+'">'+st+'</span></div>';
                        chatMessages.appendChild(reply);
                    }
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                } else if (ev.type === "hint_request" && ev.data) {
                    // Dedup AI request bubbles too
                    const reqId = ev.data.id || ("req_" + Date.now());
                    if (reqId && document.getElementById("cmsg-" + reqId)) return;
                    const h = {
                        id: reqId,
                        message: ev.data.message || "",
                        timestamp: new Date().toISOString(),
                        status: "request",
                        type: "request",
                    };
                    chatMessages.appendChild(chatMsgEl(h));
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                } else if (ev.type === "hint_wait") {
                    if (_waitNotice) try { chatMessages.removeChild(_waitNotice); } catch(_){}
                    _waitNotice = document.createElement("div");
                    _waitNotice.className = "hint-wait-notice";
                    _waitNotice.textContent = "⏳ AI is waiting up to 30s for your response…";
                    chatMessages.appendChild(_waitNotice);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    setTimeout(() => {
                        if (_waitNotice) { try { chatMessages.removeChild(_waitNotice); } catch(_){} _waitNotice = null; }
                    }, 31000);
                } else if (ev.type === "hint_wait_done") {
                    if (_waitNotice) {
                        _waitNotice.textContent = ev.data?.early ? "✅ Response received — AI resuming." : "⏱ Wait time elapsed — AI resuming.";
                        _waitNotice.style.color = ev.data?.early ? "#5fca7a" : "#555";
                        setTimeout(() => {
                            if (_waitNotice) { try { chatMessages.removeChild(_waitNotice); } catch(_){} _waitNotice = null; }
                        }, 2000);
                    }
                }
            }

            async function sendChatHint() {
                const input = document.getElementById("chat-input");
                const status = document.getElementById("chat-send-status");
                const text = input.value.trim();
                if (!text) return;
                input.disabled = true;
                status.textContent = "sending…";
                try {
                    if (MOCK_MODE) {
                        addChatEvent({
                            type: "hint",
                            data: { text, timestamp: new Date().toISOString() },
                        });
                        status.textContent = "sent (mock)";
                    } else {
                        const r = await fetch("/api/hint", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ text }),
                        });
                        const d = await r.json();
                        if (!d.ok) {
                            status.textContent = "error: " + esc(d.error || "");
                            input.disabled = false;
                            return;
                        }
                        // Optimistically add to chat (WS event will also fire but we guard by id)
                        addChatEvent({
                            type: "hint",
                            data: {
                                id: d.result?.id,
                                text,
                                timestamp: new Date().toISOString(),
                            },
                        });
                        status.textContent = "sent";
                    }
                    input.value = "";
                } catch (e) {
                    status.textContent = "error";
                }
                input.disabled = false;
                input.focus();
                setTimeout(() => {
                    status.textContent = "";
                }, 2000);
            }
            document
                .getElementById("chat-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") sendChatHint();
                });

            // ── Files ──
            let fileNavPath = "";
            async function loadFiles(rel) {
                rel = rel !== undefined ? rel : fileNavPath;
                fileNavPath = rel;
                const tree = document.getElementById("file-tree");
                let data;
                try {
                    const r = await apiFetch(
                        "/api/files?path=" + encodeURIComponent(rel || ""),
                    );
                    data = await r.json();
                } catch (e) {
                    tree.innerHTML =
                        '<div class="item" style="color:#ff5e5e">Fetch error: ' +
                        esc(String(e)) +
                        "</div>";
                    return;
                }
                tree.innerHTML = "";
                if (!Array.isArray(data)) {
                    tree.innerHTML =
                        '<div class="item" style="color:#ff5e5e">' +
                        (data && data.error
                            ? esc(data.error)
                            : "Bad response") +
                        "</div>";
                    return;
                }
                const label =
                    "/open/" +
                    (rel ? (rel.startsWith("/") ? rel.slice(1) : rel) : "");
                const bc = document.createElement("div");
                bc.className = "breadcrumb";
                bc.textContent = label;
                tree.appendChild(bc);
                if (rel) {
                    const up = document.createElement("div");
                    up.className = "item dir";
                    up.textContent = "../";
                    const parent = rel.includes("/")
                        ? rel.slice(0, rel.lastIndexOf("/"))
                        : "";
                    up.onclick = () => loadFiles(parent);
                    tree.appendChild(up);
                }
                for (const e of data) {
                    const el = document.createElement("div");
                    el.className = "item" + (e.isDir ? " dir" : "");
                    el.textContent = e.isDir
                        ? e.name + "/"
                        : e.name +
                          (e.size != null ? " (" + fmtSize(e.size) + ")" : "");
                    const entryPath =
                        (rel ? rel.replace(/\/$/, "") + "/" : "") + e.name;
                    if (e.isDir) {
                        el.onclick = () => loadFiles(entryPath);
                    } else {
                        el.onclick = () => loadFileContent(entryPath, el);
                    }
                    tree.appendChild(el);
                }
            }
            function fmtSize(b) {
                return b < 1024
                    ? b + "b"
                    : b < 1024 * 1024
                      ? (b / 1024).toFixed(1) + "kb"
                      : (b / 1024 / 1024).toFixed(2) + "mb";
            }
            async function loadFileContent(relPath, clickedEl) {
                document
                    .querySelectorAll("#file-tree .item")
                    .forEach((x) => x.classList.remove("sel"));
                if (clickedEl) clickedEl.classList.add("sel");
                document.getElementById("file-path-label").textContent =
                    "/open/" + relPath;
                const fc = document.getElementById("file-content");
                fc.textContent = "Loading...";
                try {
                    const r = await apiFetch(
                        "/api/file?path=" + encodeURIComponent(relPath),
                    );
                    const data = await r.json();
                    if (data.error) {
                        fc.style.color = "#ff5e5e";
                        fc.textContent = data.error;
                        return;
                    }
                    fc.style.color = "#e0e0e0";
                    fc.textContent = data.content;
                } catch (e) {
                    fc.style.color = "#ff5e5e";
                    fc.textContent = "Fetch error: " + String(e);
                }
            }

            // ── Memory ──
            async function loadMemory() {
                const el = document.getElementById("mem-list");
                try {
                    const data = await apiFetch("/api/memory").then((r) =>
                        r.json(),
                    );
                    el.innerHTML = "";
                    const keys = Object.keys(data);
                    if (!keys.length) {
                        el.innerHTML =
                            '<div style="color:#555">No memory entries.</div>';
                        return;
                    }
                    for (const k of keys) {
                        const v = data[k];
                        const d = document.createElement("div");
                        d.className = "data-item";
                        const tags = (v.tags || []).length
                            ? '<span class="meta">tags: ' +
                              esc(v.tags.join(", ")) +
                              "</span> "
                            : "";
                        const upd = v.updatedAt
                            ? '<span class="meta">' +
                              esc(v.updatedAt) +
                              "</span>"
                            : "";
                        d.innerHTML =
                            '<span class="key">' +
                            esc(k) +
                            '</span><br><span class="val">' +
                            esc(JSON.stringify(v.value)) +
                            "</span><br>" +
                            tags +
                            upd;
                        el.appendChild(d);
                    }
                } catch (e) {
                    el.innerHTML =
                        '<div style="color:#ff5e5e">Error: ' +
                        esc(String(e)) +
                        "</div>";
                }
            }

            // ── Goals ──
            async function loadGoals() {
                const el = document.getElementById("goals-list");
                try {
                    const data = await apiFetch("/api/goals").then((r) =>
                        r.json(),
                    );
                    el.innerHTML = "";
                    if (!data.length) {
                        el.innerHTML =
                            '<div style="color:#555">No goals.</div>';
                        return;
                    }
                    for (const g of data) {
                        const d = document.createElement("div");
                        d.className = "data-item";
                        const pri = g.priority || "normal";
                        d.innerHTML =
                            '<span class="badge ' +
                            esc(pri) +
                            '">' +
                            esc(pri) +
                            '</span><span class="val">' +
                            esc(g.goal) +
                            '</span><br><span class="meta">' +
                            esc(g.createdAt || "") +
                            "</span>";
                        el.appendChild(d);
                    }
                } catch (e) {
                    el.innerHTML =
                        '<div style="color:#ff5e5e">Error: ' +
                        esc(String(e)) +
                        "</div>";
                }
            }

            // ── Restarts ──
            async function loadRestarts() {
                const el = document.getElementById("restarts-list");
                try {
                    const data = await apiFetch("/api/restarts").then((r) =>
                        r.json(),
                    );
                    el.innerHTML = "";
                    if (!data.length) {
                        el.innerHTML =
                            '<div style="color:#555">No restart history.</div>';
                        return;
                    }
                    for (const rs of [...data].reverse()) {
                        const d = document.createElement("div");
                        d.className = "data-item";
                        const st = rs.status || "pending";
                        d.innerHTML =
                            '<span class="badge ' +
                            esc(st) +
                            '">' +
                            esc(st) +
                            '</span><span class="meta">' +
                            esc(rs.timestamp || "") +
                            '</span><br><span class="val">' +
                            esc(rs.reason || "(no reason)") +
                            "</span>" +
                            (rs.outcome
                                ? '<br><span class="meta">outcome: ' +
                                  esc(rs.outcome) +
                                  "</span>"
                                : "");
                        el.appendChild(d);
                    }
                } catch (e) {
                    el.innerHTML =
                        '<div style="color:#ff5e5e">Error: ' +
                        esc(String(e)) +
                        "</div>";
                }
            }

            // ── Snapshots ──
            async function loadSnapshots() {
                const el = document.getElementById("snapshots-list");
                try {
                    const data = await apiFetch("/api/snapshots").then((r) =>
                        r.json(),
                    );
                    el.innerHTML = "";
                    if (!data.length) {
                        el.innerHTML =
                            '<div style="color:#555">No snapshots.</div>';
                        return;
                    }
                    for (const s of [...data].reverse()) {
                        const d = document.createElement("div");
                        d.className = "data-item";
                        d.innerHTML =
                            '<span class="key">' +
                            esc(s.id) +
                            '</span> <span class="meta">' +
                            esc(s.timestamp || "") +
                            "</span>" +
                            (s.label
                                ? '<br><span class="val">' +
                                  esc(s.label) +
                                  "</span>"
                                : "") +
                            (s.note
                                ? '<br><span class="meta">' +
                                  esc(s.note) +
                                  "</span>"
                                : "");
                        el.appendChild(d);
                    }
                } catch (e) {
                    el.innerHTML =
                        '<div style="color:#ff5e5e">Error: ' +
                        esc(String(e)) +
                        "</div>";
                }
            }
        </script>
    </body>
</html>
